<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحة امتنان</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #fce4ec; }
        .hidden { display: none; }
        .page { margin-top: 50px; }
        button { padding: 20px 40px; font-size: 20px; background: red; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="p1" class="page">
        <h1>الحب والحنان من امتنان</h1>
        <button onclick="document.getElementById('p1').style.display='none'; document.getElementById('p2').style.display='block';">الحب</button>
    </div>

    <div id="p2" class="page hidden">
        <h1>اختر:</h1>
        <button onclick="document.getElementById('p2').style.display='none'; document.getElementById('p3').style.display='block';">للبوس</button>
        <button onclick="document.getElementById('p2').style.display='none'; document.getElementById('p3').style.display='block';">للحضن</button>
    </div>

    <div id="p3" class="page hidden">
        <h1 style="font-size: 50px; color: red;">بشر أمك</h1>
    </div>

</body>
</html>
